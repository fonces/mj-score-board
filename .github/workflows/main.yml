name: github pages

# main ブランチへの push で gh-pages へデプロイする
on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VUE_APP_GA_MEASUREMENT_ID: ${{ secrets.VUE_APP_GA_MEASUREMENT_ID }}

      # GitHub Pages は _ で始まるディレクトリを Jekyll で除外するので、それを抑止する
      - name: Add .nojekyll
        run: touch ./dist/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
